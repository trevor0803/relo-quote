<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relocation Quote</title>
</head>
<body>
    <h1>Get Your Quote!</h1>
    <section>
        <h2>Local Move</h2>
        <p>To get started with your Local Move, please provide your ZIP code. </p>
        <p>We will help you arrange your move without needing extra details like city and state.</p>
    </section>
    <section>
        <h2>Moving From</h2>
        <label for="from-zip">ZIP Code:</label>
        <input type="text" id="from-zip" placeholder="Enter ZIP Code">
    </section>
    <section>
        <h2>Moving To</h2>
        <label for="to-zip">ZIP Code:</label>
        <input type="text" id="to-zip" placeholder="Enter ZIP Code">
    </section>
</body>
</html>
